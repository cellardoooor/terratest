name: Sync all branches to GitLab

on:
  push:
    branches: [ main, ft/** ]  # Все ft/ ветки и main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Все коммиты всех веток
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITLAB_SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          
          cat >> ~/.ssh/config << 'EOF'
          Host gitlab.com
            HostName gitlab.com
            User git
            IdentityFile ~/.ssh/key
            StrictHostKeyChecking no
          EOF
          
      - name: Sync all branches to GitLab
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Добавляем remote GitLab
          git remote add gitlab git@gitlab.com:cellardoooor/terratest.git || true
          
          # Получаем ВСЕ локальные ветки
          echo "Available branches:"
          git branch -a
          
          # Пушим ВСЕ локальные ветки
          echo "Pushing all branches to GitLab..."
          git push gitlab --all --force
          
          # Пушим теги
          echo "Pushing tags..."
          git push gitlab --tags --force
          
          echo "Sync completed!"
